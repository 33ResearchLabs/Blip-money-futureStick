<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif">
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="cardGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="floatingCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind phone -->
  <ellipse cx="800" cy="520" rx="540" ry="380" fill="url(#bgGlow)"/>

  <!-- Faint guide grid -->
  <g stroke="currentColor" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>

  <!-- LEFT FLOATING CARD: incoming -->
  <g transform="translate(140, 230)" filter="url(#softShadow)">
    <rect width="340" height="128" rx="22" fill="url(#floatingCard)" stroke="#000" stroke-opacity="0.06"/>
    <circle cx="44" cy="64" r="22" fill="#10b981" fill-opacity="0.14"/>
    <path d="M 38 60 L 44 70 L 54 56" stroke="#059669" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="52" font-size="11" fill="#000" fill-opacity="0.45" letter-spacing="2.2" font-weight="600">RECEIVED</text>
    <text x="86" y="84" font-size="24" font-weight="700" fill="#0a0a0a">+ 1,200 USDT</text>
    <text x="86" y="106" font-size="12" fill="#000" fill-opacity="0.45">From wallet · 2s ago</text>
  </g>

  <!-- TOP-RIGHT: escrow badge -->
  <g transform="translate(1130, 170)" filter="url(#softShadow)">
    <rect width="320" height="92" rx="46" fill="url(#floatingCard)" stroke="#000" stroke-opacity="0.06"/>
    <circle cx="46" cy="46" r="22" fill="#0a0a0a"/>
    <path d="M 46 33 L 56 39 V 49 C 56 55 51 60 46 61 C 41 60 36 55 36 49 V 39 Z" fill="#fff" fill-opacity="0.95"/>
    <text x="82" y="40" font-size="10" fill="#000" fill-opacity="0.45" letter-spacing="2.2" font-weight="700">DAO ESCROW</text>
    <text x="82" y="62" font-size="15" font-weight="700" fill="#0a0a0a">Non-custodial</text>
    <text x="82" y="78" font-size="11" fill="#000" fill-opacity="0.5">Secured on Solana</text>
  </g>

  <!-- RIGHT FLOATING CARD: cash-out -->
  <g transform="translate(1170, 620)" filter="url(#softShadow)">
    <rect width="340" height="128" rx="22" fill="url(#floatingCard)" stroke="#000" stroke-opacity="0.06"/>
    <circle cx="44" cy="64" r="22" fill="#0a0a0a" fill-opacity="0.06"/>
    <path d="M 38 68 L 44 58 L 54 72" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="52" font-size="11" fill="#000" fill-opacity="0.45" letter-spacing="2.2" font-weight="600">CASH OUT</text>
    <text x="86" y="84" font-size="24" font-weight="700" fill="#0a0a0a">4,408 AED</text>
    <text x="86" y="106" font-size="12" fill="#000" fill-opacity="0.45">Settled in 47 sec</text>
  </g>

  <!-- BOTTOM-LEFT FLOATING CARD: live rate -->
  <g transform="translate(110, 690)" filter="url(#softShadow)">
    <rect width="280" height="92" rx="20" fill="url(#floatingCard)" stroke="#000" stroke-opacity="0.06"/>
    <text x="22" y="34" font-size="10" fill="#000" fill-opacity="0.45" letter-spacing="2.2" font-weight="700">LIVE RATE</text>
    <text x="22" y="64" font-size="20" font-weight="700" fill="#0a0a0a">USDT → AED</text>
    <text x="258" y="64" text-anchor="end" font-size="20" font-weight="700" fill="#0a0a0a">3.673</text>
    <circle cx="22" cy="80" r="3" fill="#10b981"/>
    <text x="32" y="84" font-size="11" fill="#10b981" font-weight="600">Live · 9 exchanges</text>
  </g>

  <!-- ============== PHONE ============== -->
  <g transform="translate(640, 130)" filter="url(#softShadow)">
    <!-- Bezel -->
    <rect width="320" height="700" rx="52" fill="#0a0a0a"/>
    <!-- Side button -->
    <rect x="-2" y="220" width="4" height="60" rx="2" fill="#1a1a1a"/>
    <!-- Screen -->
    <rect x="9" y="9" width="302" height="682" rx="44" fill="url(#phoneScreen)"/>
    <!-- Dynamic island / notch -->
    <rect x="120" y="22" width="80" height="24" rx="12" fill="#000"/>

    <!-- ===== APP CONTENT ===== -->
    <g transform="translate(34, 70)">
      <!-- Status bar -->
      <text x="0" y="14" font-size="11" font-weight="600" fill="#fff">9:41</text>
      <g transform="translate(220, 8)">
        <rect width="14" height="8" rx="1.5" fill="#fff" fill-opacity="0.85"/>
        <rect x="2" y="2" width="8" height="4" fill="#10b981"/>
      </g>

      <!-- Header: logo + avatar -->
      <g transform="translate(0, 40)">
        <text x="0" y="20" font-size="20" font-weight="800" fill="#fff" letter-spacing="-0.5">blip</text>
        <circle cx="6" cy="14" r="3" fill="#10b981"/>
        <circle cx="232" cy="14" r="16" fill="#fff" fill-opacity="0.08"/>
        <circle cx="232" cy="10" r="4" fill="#fff" fill-opacity="0.6"/>
        <path d="M 222 22 Q 232 17 242 22" stroke="#fff" stroke-opacity="0.6" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>

      <!-- Balance block -->
      <g transform="translate(0, 100)">
        <text x="0" y="14" font-size="10" fill="#fff" fill-opacity="0.5" letter-spacing="2.2" font-weight="700">TOTAL BALANCE</text>
        <text x="0" y="56" font-size="36" font-weight="700" fill="#fff" letter-spacing="-1.2">$12,847.50</text>
        <g transform="translate(0, 72)">
          <path d="M 0 6 L 5 0 L 10 6 Z" fill="#10b981"/>
          <text x="14" y="9" font-size="12" fill="#10b981" font-weight="600">2.4% today</text>
          <text x="80" y="9" font-size="12" fill="#fff" fill-opacity="0.4">+ $301.42</text>
        </g>
      </g>

      <!-- Swap card -->
      <g transform="translate(0, 220)">
        <rect width="248" height="116" rx="18" fill="url(#cardGlass)" stroke="#fff" stroke-opacity="0.08"/>
        <text x="16" y="26" font-size="9" fill="#fff" fill-opacity="0.45" letter-spacing="2.2" font-weight="700">YOU PAY</text>
        <text x="16" y="56" font-size="22" font-weight="700" fill="#fff">1,000 USDT</text>
        <circle cx="220" cy="48" r="14" fill="#26a17b"/>
        <text x="220" y="53" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">₮</text>

        <line x1="16" x2="232" y1="72" y2="72" stroke="#fff" stroke-opacity="0.06"/>
        <circle cx="124" cy="72" r="11" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-opacity="0.4"/>
        <path d="M 119 72 L 124 67 L 129 72 M 124 67 L 124 77" stroke="#10b981" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <text x="16" y="92" font-size="9" fill="#fff" fill-opacity="0.45" letter-spacing="2.2" font-weight="700">YOU GET</text>
        <text x="16" y="106" font-size="14" font-weight="600" fill="#fff">3,673 AED</text>
        <text x="232" y="106" text-anchor="end" font-size="11" fill="#10b981">≈ 47 sec</text>
      </g>

      <!-- Quick actions -->
      <g transform="translate(0, 358)">
        <!-- Send -->
        <g>
          <rect width="76" height="68" rx="16" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.06"/>
          <path d="M 38 24 L 38 44 M 30 32 L 38 24 L 46 32" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="38" y="60" text-anchor="middle" font-size="10" fill="#fff" fill-opacity="0.7">Send</text>
        </g>
        <!-- Swap -->
        <g transform="translate(86, 0)">
          <rect width="76" height="68" rx="16" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.06"/>
          <path d="M 30 28 L 46 28 L 42 24 M 46 40 L 30 40 L 34 44" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="38" y="60" text-anchor="middle" font-size="10" fill="#fff" fill-opacity="0.7">Swap</text>
        </g>
        <!-- Cash out (highlighted) -->
        <g transform="translate(172, 0)">
          <rect width="76" height="68" rx="16" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-opacity="0.5"/>
          <text x="38" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">$</text>
          <text x="38" y="60" text-anchor="middle" font-size="10" fill="#10b981" font-weight="700">Cash out</text>
        </g>
      </g>

      <!-- Activity header -->
      <text x="0" y="468" font-size="10" fill="#fff" fill-opacity="0.5" letter-spacing="2.2" font-weight="700">RECENT</text>
      <text x="248" y="468" text-anchor="end" font-size="10" fill="#fff" fill-opacity="0.4">View all →</text>

      <!-- Activity row 1 -->
      <g transform="translate(0, 484)">
        <rect width="248" height="48" rx="14" fill="#fff" fill-opacity="0.03"/>
        <circle cx="26" cy="24" r="11" fill="#10b981" fill-opacity="0.2"/>
        <path d="M 22 22 L 26 28 L 32 20" stroke="#10b981" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="22" font-size="11" font-weight="600" fill="#fff">USDT received</text>
        <text x="46" y="36" font-size="9" fill="#fff" fill-opacity="0.4">2s ago · escrow</text>
        <text x="238" y="30" text-anchor="end" font-size="12" font-weight="700" fill="#10b981">+1,200</text>
      </g>

      <!-- Activity row 2 -->
      <g transform="translate(0, 540)">
        <rect width="248" height="48" rx="14" fill="#fff" fill-opacity="0.03"/>
        <circle cx="26" cy="24" r="11" fill="#fff" fill-opacity="0.08"/>
        <path d="M 22 26 L 26 18 L 32 30" stroke="#fff" stroke-opacity="0.7" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="22" font-size="11" font-weight="600" fill="#fff">Cash out · AED</text>
        <text x="46" y="36" font-size="9" fill="#fff" fill-opacity="0.4">47s ago · settled</text>
        <text x="238" y="30" text-anchor="end" font-size="12" font-weight="700" fill="#fff">4,408</text>
      </g>

      <!-- Bottom nav -->
      <g transform="translate(0, 616)">
        <rect width="248" height="42" rx="21" fill="#fff" fill-opacity="0.04" stroke="#fff" stroke-opacity="0.06"/>
        <circle cx="40" cy="21" r="3.5" fill="#fff"/>
        <circle cx="92" cy="21" r="3" fill="#fff" fill-opacity="0.4"/>
        <circle cx="144" cy="21" r="3" fill="#fff" fill-opacity="0.4"/>
        <circle cx="196" cy="21" r="3" fill="#fff" fill-opacity="0.4"/>
      </g>
    </g>
  </g>
</svg>
