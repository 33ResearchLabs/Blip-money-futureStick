  <body>
    <script>
      // Prevent theme flash: pick the route's default before React renders.
      // Landing ("/") defaults to light, every other route defaults to dark.
      (function() {
        try {
          var path = window.location.pathname || '/';
          var routeDefault = (path === '/' || path === '') ? 'light' : 'dark';
          // Route default takes precedence so each page paints in its intended mode.
          if (routeDefault === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // Safe fallback: dark, since most pages are dark.
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
